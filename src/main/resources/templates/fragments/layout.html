<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Shared storefront chrome: a common <head> (styles), a top navigation bar (catalog / cart /
  auth), and a language switch bar. Pages pull these in with th:replace so look-and-feel and
  navigation stay consistent across the slice.
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Pet Store</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0 auto 2rem; max-width: 52rem;
               color: #222; line-height: 1.5; padding: 0 1rem; }
        a { color: #2b6cb0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { color: #2b6cb0; }
        header.topbar { display: flex; align-items: center; gap: 1rem; padding: .8rem 0;
                        border-bottom: 1px solid #eee; margin-bottom: 1.5rem; font-size: .95rem; }
        header.topbar .spacer { flex: 1; }
        header.topbar .auth { font-size: .9rem; color: #555; }
        header.topbar form.inline { display: inline; margin: 0; }
        header.topbar button.link { background: none; border: none; color: #2b6cb0; cursor: pointer;
                                    font: inherit; padding: 0; }
        header.topbar button.link:hover { text-decoration: underline; }
        nav.crumbs { font-size: .9rem; margin: 0 0 1.5rem; color: #666; }
        .langbar { font-size: .85rem; }
        .langbar a { margin-left: .5rem; }
        ul.grid { list-style: none; padding: 0; display: grid;
                  grid-template-columns: repeat(auto-fill, minmax(9rem, 1fr)); gap: .75rem; }
        ul.grid li { background: #ebf8ff; border-radius: .5rem; padding: .9rem; text-align: center; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #eee; }
        th { color: #555; font-size: .85rem; text-transform: uppercase; letter-spacing: .03em; }
        .attrs { color: #666; font-size: .9rem; }
        .price { font-weight: 600; white-space: nowrap; }
        .muted { color: #999; font-size: .85rem; }
        .card { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: .5rem;
                padding: 1.5rem; max-width: 24rem; }
        label { display: block; margin: .6rem 0 .2rem; font-size: .9rem; color: #444; }
        input[type=text], input[type=password], input[type=number] {
            padding: .4rem .5rem; border: 1px solid #cbd5e0; border-radius: .3rem; font: inherit; }
        button.primary { margin-top: 1rem; background: #2b6cb0; color: #fff; border: none;
                         padding: .5rem .9rem; border-radius: .4rem; cursor: pointer; font: inherit; }
        .error { color: #c53030; font-size: .85rem; }
        .notice { color: #276749; }
    </style>
</head>
<body>
<header th:fragment="topbar(currentPath)" class="topbar">
    <a th:href="@{/}" href="/">🐾 Pet Store</a>
    <a th:href="@{/categories}" href="/categories">Catalog</a>
    <a th:href="@{/cart}" href="/cart">Cart</a>
    <span class="spacer"></span>
    <span class="auth" sec:authorize="isAuthenticated()">
        Signed in as <strong sec:authentication="name">user</strong> —
        <a th:href="@{/account}" href="/account">Account</a>
        <form class="inline" th:action="@{/logout}" method="post">
            <button class="link" type="submit">Log out</button>
        </form>
    </span>
    <span class="auth" sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}" href="/login">Log in</a> ·
        <a th:href="@{/register}" href="/register">Register</a>
    </span>
    <span class="langbar">
        <a th:href="@{__${currentPath}__(lang='en_US')}" href="?lang=en_US">EN</a>
        <a th:href="@{__${currentPath}__(lang='ja_JP')}" href="?lang=ja_JP">日本語</a>
        <a th:href="@{__${currentPath}__(lang='zh_CN')}" href="?lang=zh_CN">中文</a>
    </span>
</header>
</body>
</html>
