<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${category.name} + ' — Pet Store')}">
    <title>Category — Pet Store</title>
</head>
<body>
<header th:replace="~{fragments/layout :: topbar(${currentPath})}"></header>
<nav class="crumbs">
    <a th:href="@{/}" href="/">Home</a> /
    <a th:href="@{/categories}" href="/categories">Catalog</a> /
    <span th:text="${category.name}">Fish</span>
</nav>

<h1 th:text="${category.name}">Fish</h1>
<ul class="grid">
    <li th:each="p : ${products}">
        <a th:href="@{/products/{id}(id=${p.id})}" th:text="${p.name}" href="#">Angelfish</a>
        <div class="muted" th:text="${p.description}">desc</div>
    </li>
</ul>
<p th:if="${products.isEmpty()}" class="muted">This category has no products for this locale.</p>
</body>
</html>
