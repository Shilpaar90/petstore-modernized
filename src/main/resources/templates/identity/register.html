<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register — Pet Store')}">
    <title>Register — Pet Store</title>
</head>
<body>
<header th:replace="~{fragments/layout :: topbar(${currentPath})}"></header>

<h1>Create an account</h1>

<form class="card" th:action="@{/register}" th:object="${form}" method="post">
    <label for="username">Username</label>
    <input type="text" id="username" th:field="*{username}" autofocus/>
    <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">username error</span>

    <label for="password">Password</label>
    <input type="password" id="password" th:field="*{password}"/>
    <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">password error</span>

    <button class="primary" type="submit">Register</button>
</form>

<p class="muted">Already registered? <a th:href="@{/login}" href="/login">Log in</a>.</p>
</body>
</html>
