<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Log in — Pet Store')}">
    <title>Log in — Pet Store</title>
</head>
<body>
<header th:replace="~{fragments/layout :: topbar(${currentPath})}"></header>

<h1>Log in</h1>

<p class="error" th:if="${param.error}">Invalid username or password.</p>
<p class="notice" th:if="${param.logout}">You have been logged out.</p>
<p class="notice" th:if="${param.registered}">Account created — please log in.</p>

<form class="card" th:action="@{/login}" method="post">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autofocus required/>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required/>

    <button class="primary" type="submit">Log in</button>
</form>

<p class="muted">No account? <a th:href="@{/register}" href="/register">Register</a>.</p>
</body>
</html>
