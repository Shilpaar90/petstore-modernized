spring:
  application:
    name: Pet Store (Modernized)

  # Default profile is the relational (JPA) target. MongoDB is on the classpath for the `mongo`
  # profile (Phase 5) — keep its auto-config off here so the default run is pure JPA and its
  # health/connection machinery never activates. The `mongo` profile re-enables it and instead
  # excludes the JPA stack (see application-mongo.yml).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
      # Test-only class (flapdoodle); absent at runtime so this entry is ignored there, but it
      # keeps embedded Mongo from starting in the default-profile (JPA) tests.
      - de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

  # Relational (JPA) is the default/faithful migration target (ADR-0004).
  # Dev/demo uses embedded H2 — zero external dependency (see README).
  datasource:
    url: jdbc:h2:mem:petstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate only validates that the entity mappings match it.
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  # Schema + seed as versioned migrations, derived from the legacy PopulateSQL.xml / Populate-UTF8.xml.
  flyway:
    enabled: true
    locations: classpath:db/migration

  # H2 web console for local inspection during development.
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  # Finish in-flight requests before exiting (clean container stop / rolling deploys).
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      # Liveness/readiness groups for container orchestration.
      probes:
        enabled: true

logging:
  level:
    com.example.petstore: INFO
